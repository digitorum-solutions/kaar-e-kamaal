<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <base target="_top">
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background-image: url('bg.jpeg');
      background-size: cover;
      background-position: top center;
      background-repeat: no-repeat;
      position: relative;
    }
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      z-index: -1;
    }
    .logo-left, .logo-right {
      position: fixed;
      top: 20px;
      width: 140px;
      height: auto;
      z-index: 2;
    }
    .logo-left { left: 20px; }
    .logo-right { right: 20px; }

    .center-header {
      text-align: center;
      margin-top: 40px;
      z-index: 2;
      position: relative;
    }
    .center-header img {
      width: 160px;
      height: auto;
      margin-bottom: 10px;
    }

    .status-button {
      display: inline-block;
      background-color: #673ab7;
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: bold;
      text-decoration: none;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
    }
    .status-button:hover { background-color: #5e35b1; }

    .container {
      max-width: 600px;
      margin: 30px auto;
      background: rgba(255, 255, 255, 0.95);
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      border-top: 10px solid #673ab7;
      position: relative;
      z-index: 1;
    }
    h2 {
      text-align: center;
      color: #673ab7;
      margin-bottom: 20px;
    }
    label {
      font-weight: bold;
      margin-top: 15px;
      display: block;
    }
    input[type="text"], input[type="tel"], textarea {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }
    input::placeholder, textarea::placeholder {
      color: rgba(0, 0, 0, 0.5);
      font-style: italic;
    }
    textarea[name="caseDetail"] { min-height: 120px; }

    .radio-row {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 10px;
    }
    .radio-row label {
      font-weight: normal;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    input[type="radio"] { accent-color: #673ab7; }

    button {
      background: #673ab7;
      color: white;
      padding: 12px;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      width: 100%;
      margin-top: 30px;
      cursor: pointer;
    }
    button:hover { background: #5e35b1; }

    /* Spinner Modal */
    #spinnerModal {
      display: none;
      position: fixed;
      z-index: 9999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(6px);
      animation: fadeIn 0.4s ease;
    }
    .spinner-content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(1);
      background: linear-gradient(145deg, #ffffff, #f3e8ff);
      padding: 40px 25px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 8px 25px rgba(0,0,0,0.3);
      max-width: 330px;
      animation: popIn 0.4s ease;
    }
    .spinner-content h3 {
      font-size: 19px;
      color: #5e35b1;
      margin-bottom: 12px;
      font-weight: bold;
    }
    .spinner-content p {
      font-size: 22px;
      color: #111;
      font-family: 'Scheherazade', serif;
      margin-bottom: 25px;
    }
    .spinner-loader {
      width: 50px;
      height: 50px;
      border: 4px solid #673ab7;
      border-top: 4px solid transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: auto;
    }
    .wait-text {
      font-size: 16px;
      color: #444;
      font-style: italic;
      animation: fadeIn 1s ease-in-out infinite alternate;
      margin-top: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes popIn {
      from { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
      to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    }
  </style>
</head>
<body>

  <!-- Spinner Modal -->
  <div id="spinnerModal">
    <div class="spinner-content">
      <h3>✨ Recite Darood Shareef At least 3 Times ✨</h3>
      <p>اللّهُمَّ صَلِّ عَلَى مُحَمَّدٍ وَعَلَى آلِ مُحَمَّدٍ</p>
      <div class="spinner-loader"></div>
      <div class="wait-text">Please wait...</div>
    </div>
  </div>

  <!-- Logos -->
  <div>
    <img src="https://i.postimg.cc/rFH70bnH/logoa.png" class="logo-left" alt="Left Logo">
    <img src="https://i.postimg.cc/rFH70bnH/logoa.png" class="logo-right" alt="Right Logo">
  </div>

</body>
</html>
