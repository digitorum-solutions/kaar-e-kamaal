<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <base target="_top">
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background-image: url('bg.jpeg');
      background-size: cover;
      background-position: top center;
      background-repeat: no-repeat;
      position: relative;
    }
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      z-index: -1;
    }
    .container {
      max-width: 600px;
      margin: 30px auto;
      background: rgba(255, 255, 255, 0.95);
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      border-top: 10px solid #673ab7;
      position: relative;
      z-index: 1;
    }
    h2 {
      text-align: center;
      color: #673ab7;
      margin-bottom: 20px;
    }
    label {
      font-weight: bold;
      margin-top: 15px;
      display: block;
    }
    input[type="text"], input[type="tel"], input[type="date"], textarea {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }
    textarea[name="caseDetail"] { min-height: 120px; }
    button {
      background: #673ab7;
      color: white;
      padding: 12px;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      width: 100%;
      margin-top: 30px;
      cursor: pointer;
    }
    button:hover { background: #5e35b1; }
    .spinner {
      margin-left: 10px;
      border: 3px solid #fff;
      border-top: 3px solid #673ab7;
      border-radius: 50%;
      width: 16px;
      height: 16px;
      display: inline-block;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="container">
  <h2>Case Submission Form</h2>
  <form id="caseForm">
    <label for="referrerName">Referrer Name</label>
    <input type="text" id="referrerName" name="referrerName" placeholder="Enter your name" required>

    <label for="phone">Phone Number (+92XXXXXXXXXX)</label>
    <input type="tel" id="phone" name="phone" placeholder="+92XXXXXXXXXX" required>

    <label for="caseDate">Case Date</label>
    <input type="date" id="caseDate" name="caseDate" required>

    <label for="caseDetail">Case Details</label>
    <textarea id="caseDetail" name="caseDetail" placeholder="Write details here..." required></textarea>

    <button type="submit">Submit</button>
  </form>
</div>

<script>
  const dateInput = document.getElementById('caseDate');
  const today = new Date();
  dateInput.value = today.toLocaleDateString('en-GB');

  const form = document.getElementById("caseForm");
  const submitButton = form.querySelector('button[type="submit"]');

  // Spinner element
  const spinner = document.createElement('span');
  spinner.className = 'spinner';

  function validateNumber(input) {
    const pattern = /^\+92[0-9]{10}$/;
    if (!pattern.test(input.value)) {
      input.setCustomValidity("Please enter number in +92XXXXXXXXXX format");
    } else {
      input.setCustomValidity("");
    }
  }

  document.querySelectorAll('input[type="tel"]').forEach(input => {
    input.addEventListener('input', () => validateNumber(input));
  });

  form.addEventListener("submit", e => {
    e.preventDefault();

    // Disable button and show spinner
    submitButton.disabled = true;
    submitButton.textContent = "Submitting...";
    submitButton.appendChild(spinner);

    const data = new FormData(form);
    fetch("https://script.google.com/macros/s/AKfycbxirFr1DYb0gPWieTyXz8DfHbN9eG7RWEFX-0_eTgT-CKrvrbRiGGCjbNBEXJ47t0oB7Q/exec", {
      method: "POST",
      body: data
    })
    .then(res => res.ok ? res.text() : Promise.reject("Network error"))
    .then(txt => {
      alert("✅ Form submitted successfully!");
      form.reset();
      dateInput.value = today.toLocaleDateString('en-GB');
      form.referrerName.focus();
    })
    .catch(err => {
      alert("❌ Error submitting form. Please try again.");
    })
    .finally(() => {
      // Re-enable button and remove spinner
      submitButton.disabled = false;
      submitButton.textContent = "Submit";
      spinner.remove();
    });
  });
</script>

</body>
</html>
